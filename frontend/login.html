        <div class="section-inner">
          <h2>Login to Blue Pearl</h2>
          <p>Use Google, Social ID, or email/password to sign in.</p>
          <div class="panel">
            <button class="social-btn google">Continue with Google</button>
            <button class="social-btn">Continue with Social ID</button>
            <form id="loginPageForm">
              <label>Email<input id="loginEmailInput" type="email" placeholder="you@example.com"></label>
              <label>Password<input id="loginPassInput" type="password" placeholder="••••••"></label>
              <button type="submit" class="submit-btn">Sign in</button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>
